<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — Rony Cozzi</title>
  <meta name="robots" content="noindex" />
  <style>
    @font-face { font-family: 'Fraunces'; src: url('/assets/fonts/fraunces-normal-500-latin.woff2') format('woff2'); font-weight: 500; font-display: swap; }
    @font-face { font-family: 'JetBrains Mono'; src: url('/assets/fonts/jetbrainsmono-normal-400-latin.woff2') format('woff2'); font-weight: 400; font-display: optional; }
    * { margin: 0; box-sizing: border-box; }
    body {
      min-height: 100svh; display: flex; align-items: center; justify-content: center;
      background: #0F0D09; color: #F2ECDD; font-family: 'Fraunces', Georgia, serif;
      padding: 24px; text-align: center;
    }
    main { max-width: 560px; display: flex; flex-direction: column; gap: 18px; align-items: center; }
    .tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: #A79B85; border: 1px dashed #3B342A; border-radius: 999px; padding: 8px 14px; }
    h1 { font-weight: 500; font-size: clamp(40px, 9vw, 72px); line-height: 1.02; letter-spacing: -0.02em; }
    h1 em { font-style: italic; font-weight: 400; color: #FF4D24; }
    p { color: #A79B85; font-family: system-ui, sans-serif; font-size: 15.5px; line-height: 1.65; }
    a.retry {
      display: inline-flex; padding: 15px 26px; border-radius: 2px; background: #FF4D24; color: #16100A;
      font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
      text-decoration: none; margin-top: 6px;
    }
    a.home { color: #A79B85; font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: .08em; text-decoration: none; border-bottom: 1px solid #3B342A; padding-bottom: 3px; }
  </style>
</head>
<body>
  <main>
    <span class="tag">Offline · Sin conexión</span>
    <h1>La red se <em>cortó.</em></h1>
    <p>No hay conexión a internet ahora mismo. Las páginas que ya visitaste pueden seguir disponibles; el resto vuelve cuando vuelva la red.</p>
    <a class="retry" href="">Reintentar</a>
    <a class="home" href="/">Ir al inicio (cache)</a>
  </main>
</body>
</html>
