  <style>
    .err-page {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: var(--pad-x);
      text-align: center;
    }
    .err-inner { max-width: 520px; }
    .err-num {
      font-family: var(--font-display);
      font-size: clamp(100px, 20vw, 200px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.05em;
      color: var(--accent);
      display: block;
      margin-bottom: 16px;
    }
    .err-title {
      font-family: var(--font-display);
      font-size: clamp(20px, 3vw, 32px);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }
    .err-copy {
      color: var(--fg-muted);
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .err-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      background: var(--accent);
      color: var(--accent-ink);
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      border-radius: 6px;
      transition: opacity var(--t-fast) var(--ease), gap var(--t-fast) var(--ease);
    }
    .err-cta:hover { opacity: 0.85; gap: 14px; }
    .err-terminal {
      margin-top: 48px;
      padding: 20px 24px;
      background: var(--bg-elev);
      border: 1px solid var(--line);
      border-radius: 10px;
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      text-align: left;
      line-height: 1.8;
      color: var(--fg-muted);
    }
    .err-terminal .t-prompt { color: var(--accent); }
    .err-terminal .t-error { color: #FF5757; }
    .err-terminal .t-ok { color: #27C93F; }
    .err-cursor {
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--accent);
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
  <meta property="og:site_name" content="Rony Cozzi" />
  <meta property="og:locale" content="es_AR" />
  <meta name="twitter:creator" content="@ronycozzi" />
  <link rel="canonical" href="https://rony-cozzi.netlify.app/404.html" />
</head>
<body data-page="404">
  <a href="#main" class="skip-link">Skip to content</a>
  <div class="page-transition" aria-hidden="true">
    <div class="page-transition__panel"></div>
    <div class="page-transition__label">
      <span class="page-transition__num">—</span>
      <span class="page-transition__name">404</span>
    </div>
  </div>
  <div class="cursor" aria-hidden="true"><span class="cursor__label"></span></div>
  <div class="cursor-dot" aria-hidden="true"></div>

  <main class="err-page" id="main">
    <div class="err-inner">
      <span class="err-num" aria-hidden="true">404</span>
      <h1 class="err-title">Esta página no existe.</h1>
      <p class="err-copy">
        O nunca existió, o la movimos, o el link estaba mal desde el principio.<br/>
        No te preocupes — el home sigue ahí.
      </p>
      <a href="index.html" class="err-cta">
        Ir al inicio <span aria-hidden="true">→</span>
      </a>

      <div class="err-terminal" role="log" aria-label="Terminal output">
        <div><span class="t-prompt">$ </span>curl -I rony-cozzi.netlify.app<strong id="typed-path">/esta-pagina</strong></div>
        <div><span class="t-error">HTTP/2 404</span></div>
        <div class="t-ok">content-type: text/html; charset=utf-8</div>
        <div><span class="t-prompt">$ </span>cd ~<span class="err-cursor"></span></div>
      </div>
    </div>
  </main>

  <script src="js/main.js?v=7" defer></script>
  <script>
    // Easter egg: path in terminal shows actual URL
    try {
      const el = document.getElementById('typed-path');
      if (el) el.textContent = window.location.pathname || '/404';
    } catch(e) {}
  </script>
</body>
</html>
